{% extends 'base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <span class="auth-logo">CareerAI</span>
    <h1 class="auth-heading">Verify Your Email</h1>
    <p class="auth-sub">Enter the OTP sent to your email</p>

    <div id="auth-alert" style="display:none;" class="form-alert"></div>

    <form id="otp-form" method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="inp-email">Email</label>
        <input id="inp-email" name="email" type="email" class="form-input" placeholder="jane@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="inp-otp">OTP Code</label>
        <input id="inp-otp" name="otp" type="text" class="form-input" placeholder="Enter 6-digit code" maxlength="6" required />
      </div>

      <button type="submit" class="btn-full" id="otp-submit-btn">Verify Email</button>
    </form>

    <div class="auth-switch">
      <span>Already verified?</span>
      <button class="auth-switch-btn" onclick="window.location.href='/auth/'">Sign In</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('otp-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const formData = new FormData(this);
  const submitBtn = document.getElementById('otp-submit-btn');
  
  submitBtn.disabled = true;
  submitBtn.textContent = 'Verifying…';
  
  fetch('/api/core/auth/verify-otp/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': window.CSRF_TOKEN,
    },
    body: JSON.stringify({
      email: formData.get('email'),
      otp: formData.get('otp')
    })
  })
  .then(response => response.json())
  .then(data => {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Verify Email';
    
    if (data.access_token) {
      // Store tokens
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      
      showAuthAlert('Email verified successfully!', 'success');
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    } else {
      showAuthAlert(data.error || 'Invalid OTP', 'error');
    }
  })
  .catch(error => {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Verify Email';
    showAuthAlert('Network error. Please try again.', 'error');
  });
});

function showAuthAlert(msg, type) {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = 'form-alert ' + (type === 'success' ? 'form-alert-success' : 'form-alert-error');
  el.style.display = 'block';
}
</script>
{% endblock %}
