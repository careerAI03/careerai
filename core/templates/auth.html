{% extends 'base.html' %}

{% block content %}
<!-- ═══════════════ AUTH PAGE ═══════════════ -->
<div id="page-auth" class="page active">
  <div class="auth-wrap">
    <div class="auth-card">
      <span class="auth-logo">CareerAI</span>
      <h1 class="auth-heading" id="auth-heading">Welcome back</h1>
      <p class="auth-sub" id="auth-sub">Sign in to continue your assessment</p>

      <div id="auth-alert" style="display:none;" class="form-alert"></div>

      <!-- Login Form -->
      <form id="login-form" method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input id="login-email" name="email" type="email" class="form-input" placeholder="jane@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" name="password" type="password" class="form-input" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-full" id="login-submit-btn">Sign in</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" method="post" style="display:none;">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input id="signup-name" name="name" type="text" class="form-input" placeholder="Jane Doe" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" class="form-input" placeholder="jane@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input id="signup-password" name="password" type="password" class="form-input" placeholder="Create a password (min 8 characters)" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-confirm-password">Confirm Password</label>
          <input id="signup-confirm-password" name="confirm_password" type="password" class="form-input" placeholder="Confirm your password" required />
        </div>
        <button type="submit" class="btn-full" id="signup-submit-btn">Create Account</button>
      </form>

      <div class="auth-switch">
        <span id="auth-switch-text">Don't have an account?</span>
        <button class="auth-switch-btn" onclick="toggleAuthMode()">Sign up</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let isSignUp = false;

function toggleAuthMode() {
  isSignUp = !isSignUp;
  const heading = document.getElementById('auth-heading');
  const sub = document.getElementById('auth-sub');
  const switchText = document.getElementById('auth-switch-text');
  const switchBtn = document.querySelector('.auth-switch-btn');
  
  // Hide all forms
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'none';
  
  heading.textContent = isSignUp ? 'Create account' : 'Welcome back';
  sub.textContent = isSignUp ? 'Sign up to start your career journey' : 'Sign in to continue your assessment';
  switchText.textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
  switchBtn.textContent = isSignUp ? 'Sign in' : 'Sign up';
  
  // Show appropriate form
  if (isSignUp) {
    document.getElementById('signup-form').style.display = 'block';
  } else {
    document.getElementById('login-form').style.display = 'block';
  }
  
  hideAuthAlert();
}

function showAuthAlert(msg, type) {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = 'form-alert ' + (type === 'success' ? 'form-alert-success' : 'form-alert-error');
  el.style.display = 'block';
}

function hideAuthAlert() {
  document.getElementById('auth-alert').style.display = 'none';
}

// Login form handler
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const formData = new FormData(this);
  const submitBtn = document.getElementById('login-submit-btn');
  
  const loginData = {
    email: formData.get('email'),
    password: formData.get('password')
  };
  
  console.log('Login data:', loginData);
  
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';
  
  fetch('/api/core/auth/login/', {
    method: 'POST',
    headers: {
      'X-CSRFToken': window.CSRF_TOKEN,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(loginData)
  })
  .then(response => {
    console.log('Login response status:', response.status);
    return response.json();
  })
  .then(data => {
    console.log('Login response data:', data);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in';
    
    if (data.access_token) {
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showAuthAlert('Login successful!', 'success');
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    } else {
      showAuthAlert(data.error || 'Login failed', 'error');
    }
  })
  .catch(error => {
    console.error('Login error:', error);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in';
    showAuthAlert('Network error. Please try again.', 'error');
  });
});

// Signup form handler
document.getElementById('signup-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const formData = new FormData(this);
  const submitBtn = document.getElementById('signup-submit-btn');
  
  const signupData = {
    name: formData.get('name'),
    email: formData.get('email'),
    password: formData.get('password'),
    confirm_password: formData.get('confirm_password')
  };
  
  // Client-side validation
  if (signupData.password.length < 8) {
    showAuthAlert('Password must be at least 8 characters long', 'error');
    return;
  }
  
  if (signupData.password !== signupData.confirm_password) {
    showAuthAlert('Passwords do not match', 'error');
    return;
  }
  
  console.log('Signup data:', signupData);
  
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating Account…';
  
  fetch('/api/core/auth/register/', {
    method: 'POST',
    headers: {
      'X-CSRFToken': window.CSRF_TOKEN,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(signupData)
  })
  .then(response => {
    console.log('Registration response status:', response.status);
    return response.json();
  })
  .then(data => {
    console.log('Registration response data:', data);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
    
    if (data.access_token) {
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showAuthAlert('Account created successfully!', 'success');
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    } else {
      // Show specific error messages
      let errorMessage = data.error || 'Registration failed';
      if (data.details) {
        if (data.details.password) {
          errorMessage = `Password error: ${data.details.password}`;
        } else if (data.details.email) {
          errorMessage = `Email error: ${data.details.email}`;
        } else if (data.details.non_field_errors) {
          errorMessage = data.details.non_field_errors;
        }
      }
      showAuthAlert(errorMessage, 'error');
    }
  })
  .catch(error => {
    console.error('Registration error:', error);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
    showAuthAlert('Network error. Please try again.', 'error');
  });
});
</script>
{% endblock %}
